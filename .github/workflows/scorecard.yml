name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6 AM UTC
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    uses: netresearch/.github/.github/workflows/scorecard.yml@main
