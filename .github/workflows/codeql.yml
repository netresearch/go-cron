name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6 AM UTC
  workflow_dispatch:

permissions: read-all

jobs:
  analyze:
    name: Analyze
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: netresearch/.github/.github/workflows/codeql.yml@main
    with:
      languages: go
