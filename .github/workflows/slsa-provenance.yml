name: SLSA Provenance

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions: read-all

jobs:
  # First job: Prepare subjects for provenance
  prepare:
    name: Prepare Provenance Subjects
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      subjects: ${{ steps.subjects.outputs.subjects }}
      has_subjects: ${{ steps.subjects.outputs.has_subjects }}
      tag_name: ${{ steps.tag.outputs.tag_name }}
      tag_sha: ${{ steps.tag.outputs.tag_sha }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: Determine release tag
        id: tag
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # workflow_run.head_branch contains the tag name (e.g., "v0.13.0")
          echo "tag_name=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"
          echo "tag_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "Release tag: $HEAD_BRANCH (sha: $HEAD_SHA)"

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: |
          mkdir -p release-assets
          gh release download "$TAG_NAME" -D release-assets || true
          ls -la release-assets/

      - name: Generate provenance subjects
        id: subjects
        run: |
          cd release-assets
          # Generate SHA256 for all release assets
          if ls ./* 1> /dev/null 2>&1; then
            sha256sum ./* > ../provenance-subjects.txt
            cat ../provenance-subjects.txt

            # Base64 encode raw sha256sum output for the SLSA reusable workflow
            # (generator expects "HASH  FILENAME\n" format, NOT JSON array)
            SUBJECTS_BASE64=$(base64 -w0 < ../provenance-subjects.txt)
            echo "subjects=$SUBJECTS_BASE64" >> "$GITHUB_OUTPUT"
            echo "has_subjects=true" >> "$GITHUB_OUTPUT"
          else
            echo "No assets to hash"
            echo "has_subjects=false" >> "$GITHUB_OUTPUT"
          fi

  # Second job: Generate SLSA provenance using reusable workflow
  # Note: SLSA reusable workflows are pinned to version tags per project recommendation
  # See: https://github.com/slsa-framework/slsa-github-generator#referencing-slsa-builders-and-generators
  provenance:
    name: Generate SLSA Provenance
    needs: prepare
    if: needs.prepare.outputs.has_subjects == 'true'
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.prepare.outputs.subjects }}
      upload-assets: true
      private-repository: true  # Workaround: generator falsely detects public repos as private

  # Third job: Generate source attestation
  source-attestation:
    name: Generate Source Attestation
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.has_subjects == 'true'
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Generate source provenance attestation
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          TAG_SHA: ${{ needs.prepare.outputs.tag_sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # Create source attestation using env vars (not direct expression interpolation)
          cat > source-provenance.intoto.jsonl << EOF
          {
            "_type": "https://in-toto.io/Statement/v0.1",
            "predicateType": "https://slsa.dev/provenance/v0.2",
            "subject": [
              {
                "name": "github.com/netresearch/go-cron",
                "digest": {
                  "sha1": "$TAG_SHA"
                }
              }
            ],
            "predicate": {
              "builder": {
                "id": "https://github.com/netresearch/go-cron/actions/runs/$RUN_ID"
              },
              "buildType": "https://github.com/slsa-framework/slsa-github-generator/go@v1",
              "invocation": {
                "configSource": {
                  "uri": "git+https://github.com/netresearch/go-cron@refs/tags/$TAG_NAME",
                  "digest": {
                    "sha1": "$TAG_SHA"
                  },
                  "entryPoint": ".github/workflows/slsa-provenance.yml"
                }
              },
              "metadata": {
                "buildInvocationID": "$RUN_ID",
                "completeness": {
                  "parameters": true,
                  "environment": true,
                  "materials": true
                },
                "reproducible": false
              },
              "materials": [
                {
                  "uri": "git+https://github.com/netresearch/go-cron@refs/tags/$TAG_NAME",
                  "digest": {
                    "sha1": "$TAG_SHA"
                  }
                }
              ]
            }
          }
          EOF
          cat source-provenance.intoto.jsonl

      - name: Upload source provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" source-provenance.intoto.jsonl --clobber || true
